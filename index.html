<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Siêu Gọn</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Đẩy game lên trên chút cho dễ nhìn */
            padding: 20px;
        }

        /* KHUNG CHỨA GAME: Tự co giãn theo nội dung, không chiếm hết màn hình */
        .game-container {
            width: 100%;
            max-width: 400px;
            height: auto; /* Chiều cao tự động thu gọn theo nội dung */
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 1. PHẦN ĐỈNH: Nằm gọn góc TRÁI, bên phải trống */
        .header-panel {
            background: #2c3e50;
            color: white;
            padding: 6px 12px;
            display: flex;
            justify-content: flex-start;
            border-bottom: 1px solid #34495e;
        }
        .profile-compact {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: bold;
        }
        .profile-compact .gender {
            background: rgba(255,255,255,0.2);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* 2. PHẦN GIỮA: Giới hạn chiều cao cố định để lướt mốc tuổi TRONG phạm vi này thôi */
        .timeline-scroll {
            max-height: 200px; /* Khóa chiều cao vùng này lại để hộp game luôn nhỏ gọn */
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }
        .age-log-item {
            background: white;
            padding: 8px 10px;
            border-radius: 4px;
            border-left: 3px solid #3498db;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 12px;
            color: #333;
            line-height: 1.3;
        }

        /* 3. PHẦN ĐÁY: Gắn liền ngay dưới vùng cuộn tuổi */
        .footer-panel {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 10px 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px 10px;
            margin-bottom: 8px;
        }
        .stat-box {
            font-size: 11px;
            color: #555;
        }
        .progress-bar {
            background: #e9ecef;
            border-radius: 2px;
            height: 4px;
            width: 100%;
            margin-top: 2px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
        }
        .bg-health { background: #e74c3c; width: 85%; }
        .bg-happy { background: #f1c40f; width: 90%; }
        .bg-money { background: #27ae60; width: 60%; }
        .bg-edu { background: #3498db; width: 40%; }

        /* Nút bấm dẹt, gọn gàng */
        .next-btn {
            width: 100%;
            padding: 8px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .next-btn:hover {
            background: #219653;
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <!-- THANH TRÊN CÙNG: Góc bên trái, bên phải trống -->
    <div class="header-panel">
        <div class="profile-compact">
            <span>Nguyễn Văn A</span>
            <span class="gender">Nam</span>
        </div>
    </div>

    <!-- VÙNG CUỘN TUỔI: Bị khóa chiều cao nhỏ gọn, lướt độc lập ở đây -->
    <div class="timeline-scroll" id="timeline">
        <div class="age-log-item"><b>Tuổi 0:</b> Bạn vừa chào đời trong niềm hạnh phúc của gia đình.</div>
        <div class="age-log-item"><b>Tuổi 1:</b> Bạn bập bẹ biết nói những tiếng đầu tiên.</div>
        <div class="age-log-item"><b>Tuổi 2:</b> Bạn chập chững biết đi và thích khám phá thế giới xung quanh.</div>
    </div>

    <!-- THANH CHỈ SỐ VÀ NÚT BẤM: Gắn liền ngay sát phía dưới -->
    <div class="footer-panel">
        <div class="stats-grid">
            <div class="stat-box">
                Sức khỏe: 85%
                <div class="progress-bar"><div class="progress bg-health"></div></div>
            </div>
            <div class="stat-box">
                Hạnh phúc: 90%
                <div class="progress-bar"><div class="progress bg-happy"></div></div>
            </div>
            <div class="stat-box">
                Tiền bạc: 15.000.000đ
                <div class="progress-bar"><div class="progress bg-money"></div></div>
            </div>
            <div class="stat-box">
                Học vấn: 40%
                <div class="progress-bar"><div class="progress bg-edu"></div></div>
            </div>
        </div>

        <button class="next-btn" onclick="addAge()">Qua tuổi tiếp theo +</button>
    </div>

</div>

<script>
    let currentAge = 2;

    function addAge() {
        currentAge++;
        const timeline = document.getElementById("timeline");
        
        const newItem = document.createElement("div");
        newItem.className = "age-log-item";
        newItem.innerHTML = `<b>Tuổi ${currentAge}:</b> Nhật ký hành trình năm ${currentAge} tuổi hiển thị siêu gọn gàng.`;
        
        timeline.appendChild(newItem);
        
        // Tự động cuộn xuống mốc tuổi mới nhất bên trong hộp chứa
        timeline.scrollTop = timeline.scrollHeight;
    }
</script>

</body>
</html>
